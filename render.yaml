services:
  - type: web
    name: ridesafe-za-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: DATABASE_URL
        fromDatabase:
          name: ridesafe-db
          property: connectionString

databases:
  - name: ridesafe-db
    databaseName: ridesafe
    user: ridesafe_user
    plan: free
